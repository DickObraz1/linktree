<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DickObraz | Tomáš Horych</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .pink-bg { background-color: #ff66c4; }
        .pink-text { color: #ff66c4; }
        .pink-border { border-color: #ff66c4; }
        
        #doodle-char {
            position: fixed;
            bottom: 40px;
            left: 50%; /* Začneme uprostřed */
            font-size: 60px;
            cursor: pointer;
            z-index: 50;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transform: translateX(-50%);
            will-change: transform;
        }

        #gyro-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 10px;
            z-index: 100;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-white text-gray-900 flex flex-col items-center p-6 min-h-screen">

    <button id="gyro-btn" onclick="requestGyroPermission()" class="bg-gray-200 px-3 py-1 rounded-full uppercase font-bold">
        📳 Zapnout pohyb
    </button>

    <div id="doodle-char">🍆</div>

    <div class="flex flex-col items-center mt-10 w-full max-w-md text-center relative z-10">
        <div class="relative">
            <img src="https://cc.cz/wp-content/uploads/2025/12/tomas-horych-mvp-x1.jpg" 
                 alt="Tomáš - DickObraz" 
                 class="rounded-full w-28 h-28 border-4 pink-border shadow-xl object-cover object-top">
        </div>
        
        <h1 class="text-3xl font-extrabold mt-6 tracking-tight pink-text italic uppercase">DickObraz</h1>
        <p class="text-gray-600 mt-3 text-sm leading-relaxed px-4 italic">
            Zkus naklánět telefon do stran!
        </p>
    </div>

    <div class="flex flex-col w-full max-w-md mt-10 space-y-4 relative z-10">
        <a href="https://cc.cz/nemohl-sehnat-omalovanky-s-muzskym-prirozenim..." target="_blank" class="group pink-bg text-white p-2 rounded-full shadow-lg flex items-center transition-all hover:scale-105">
            <img src="https://cc.cz/wp-content/uploads/2025/12/tomas-horych-mvp-x1.jpg" class="w-14 h-14 rounded-full object-cover border-2 border-white">
            <span class="font-bold flex-grow text-center pr-8 uppercase">Rozhovor se mnou</span>
        </a>

        <a href="https://www.dickobraz.cz/p/omalovanky-pro-dospele-dickobraz" target="_blank" class="group pink-bg text-white p-2 rounded-full shadow-lg flex items-center transition-all hover:scale-105">
            <img src="https://dickobraz-cz.s51.cdn-upgates.com/_cache/8/6/8665de3e9fe4ed1c2b39cffe27fd1dc8-dickobraz2.jpg" class="w-14 h-14 rounded-full object-cover border-2 border-white">
            <span class="font-bold flex-grow text-center pr-8 uppercase">Pinďouří omalovánky</span>
        </a>
        
        </div>

    <footer class="mt-auto pb-6 text-gray-300 text-[10px] uppercase tracking-tighter">
        Made by DickObraz © 2026
    </footer>

    <script>
        const doodle = document.getElementById('doodle-char');
        let posY = 0;
        let posX = 0; // Horizontální pozice (v pixelech od středu)
        let targetPosX = 0; // Kam chceme, aby lilek dojel
        let velocityY = 0;
        const gravity = 0.4;
        const jumpStrength = -10;

        // Fyzika skákání
        function update() {
            velocityY += gravity;
            posY += velocityY;

            if (posY > 0) {
                posY = 0;
                velocityY = jumpStrength * 0.6;
            }

            // Plynulé vyrovnávání pohybu do stran (interpolace)
            posX += (targetPosX - posX) * 0.1;

            // Aplikace transformace (Skok + Gyro posun)
            // posX omezíme, aby lilek nezmizel z obrazovky
            const limit = (window.innerWidth / 2) - 40;
            posX = Math.max(-limit, Math.min(limit, posX));
            
            doodle.style.transform = `translate(calc(-50% + ${posX}px), ${posY}px)`;
            
            requestAnimationFrame(update);
        }

        // Velký skok na kliknutí kamkoliv
        window.addEventListener('touchstart', () => { velocityY = jumpStrength; });
        window.addEventListener('mousedown', () => { velocityY = jumpStrength; });

        // Logika gyroskopu
        function handleOrientation(event) {
            const tilt = event.gamma; // Náklon do stran (-90 až 90)
            // Změníme náklon na posun v pixelech (citlivost 5x)
            targetPosX = tilt * 5; 
        }

        async function requestGyroPermission() {
            // Kontrola pro iOS (Safari)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        document.getElementById('gyro-btn').style.display = 'none';
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Android a ostatní - stačí jen přidat event listener
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('gyro-btn').style.display = 'none';
            }
        }

        update();
    </script>
</body>
</html>

    <script>
        const doodle = document.getElementById('doodle-char');
        let y = 0;
        let velocity = 0;
        const gravity = 0.4;
        const jumpStrength = -10; // Síla velkého skoku na kliknutí

        function update() {
            velocity += gravity;
            y += velocity;

            // Kolize se zemí (v našem případě spodní okraj obrazovky)
            if (y > 0) {
                y = 0;
                velocity = jumpStrength * 0.6; // Automatický odraz (jako Doodle Jump)
                
                // Přidáme lilku rotaci při dopadu
                doodle.style.transform += ' rotate(10deg)';
                setTimeout(() => {
                   doodle.style.transform = doodle.style.transform.replace(' rotate(10deg)', '');
                }, 100);
            }

            // Použijeme translateY a zachováme případnou rotaci z dopadu
            doodle.style.transform = `translateY(${y}px)`;
            
            requestAnimationFrame(update);
        }

        // Velký skok na kliknutí
        window.addEventListener('mousedown', () => {
            velocity = jumpStrength;
        });
        
        window.addEventListener('touchstart', (e) => {
            // Reagujeme na dotyk, ale jen pokud neklikáme na odkaz (zajištěno z-indexem)
            velocity = jumpStrength;
        });

        update();
    </script>

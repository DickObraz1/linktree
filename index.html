<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj Linktree Alternativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center p-6 min-h-screen">

    <div class="flex flex-col items-center mt-10 w-full max-w-md">
        <img src="https://via.placeholder.com/100" alt="Profilovka" class="rounded-full w-24 h-24 border-4 border-indigo-500 mb-4">
        <h1 class="text-2xl font-bold">@tvojejmeno</h1>
        <p class="text-gray-400 text-center mt-2">Tvořím digitální věci a občas o tom píšu.</p>
    </div>

    <div class="flex flex-col w-full max-w-md mt-8 space-y-4">
        
        <a href="https://instagram.com/..." target="_blank" 
           class="bg-white text-gray-900 font-semibold py-4 px-6 rounded-xl text-center transition-transform hover:scale-105 active:scale-95 shadow-lg">
            📸 Instagram
        </a>

        <a href="https://youtube.com/..." target="_blank" 
           class="bg-white text-gray-900 font-semibold py-4 px-6 rounded-xl text-center transition-transform hover:scale-105 active:scale-95 shadow-lg">
            🎥 YouTube kanál
        </a>

        <a href="https://tvojewebovka.cz" target="_blank" 
           class="bg-indigo-600 text-white font-semibold py-4 px-6 rounded-xl text-center transition-transform hover:scale-105 active:scale-95 shadow-lg border border-indigo-400">
            🌐 Můj osobní web
        </a>

        <a href="mailto:ahoj@email.cz" 
           class="bg-transparent border-2 border-white text-white font-semibold py-4 px-6 rounded-xl text-center transition-transform hover:scale-105 active:scale-95">
            ✉️ Napiš mi email
        </a>

    </div>

    <footer class="mt-auto pt-10 text-gray-500 text-sm">
        2026 © Vytvořeno vlastníma rukama
    </footer>

</body>
</html>

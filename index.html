        /* Hlavní hrací lilek - schovaný na začátku */

            position: fixed;
            bottom: 40px;
            left: 50%;
            font-size: 60px;
            cursor: pointer;
            z-index: 50;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transform: translateX(-50%);
            will-change: transform;
            opacity: 0; /* Začíná neviditelný */
            transition: opacity 1s ease-in-out; /* Plynulé objevení */
        }

        #gyro-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 10px;
            z-index: 100;
            opacity: 0.6;
            cursor: pointer;
        }

        /* Styly pro padající lilky Tsunami */
        .falling-eggplant {
            position: fixed;
            top: -10vh; /* Začíná nad obrazovkou */
            pointer-events: none; /* Nelze na ně kliknout */
            z-index: 0; /* Pod tlačítky */
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(115vh) rotate(360deg); /* Propadne dolů a zatočí se */
            }
        }

    <script>
        // --- 1. TSUNAMI LOGIKA (Prší lilky) ---
        function createEggplantRain() {
            const container = document.body;
            const eggplantCount = 180; // "Stovky" - 180 je bezpečné pro výkon telefonu

            for (let i = 0; i < eggplantCount; i++) {
                const ep = document.createElement('div');
                ep.innerText = '🍆';
                ep.className = 'falling-eggplant';
                
                // Náhodná pozice na šířku (0-100vw)
                ep.style.left = Math.random() * 100 + 'vw';
                
                // Náhodná velikost (20px - 50px)
                ep.style.fontSize = Math.random() * 30 + 20 + 'px';
                
                // Náhodná rychlost pádu (1.5s - 4s)
                ep.style.animationDuration = Math.random() * 2.5 + 1.5 + 's';
                
                // Náhodné zpoždění startu (0s - 2s), aby nepadaly všechny naráz
                ep.style.animationDelay = Math.random() * 2 + 's';
                
                // Náhodná průhlednost (trochu hloubka ostrosti)
                ep.style.opacity = Math.random() * 0.5 + 0.5;

                container.appendChild(ep);

                // Úklid: Odstraní lilek z DOMu po skončení animace
                ep.addEventListener('animationend', () => {
                    ep.remove();
                });
            }

            // --- 2. OBJEVENÍ HRACÍHO LILKU ---
            // Objeví se 2.5 vteřiny po začátku deště
            setTimeout(() => {
                const mainChar = document.getElementById('doodle-char');
                mainChar.style.opacity = '1';
                startMainGameLogic(); // Spustí fyziku až po objevení
            }, 2500);
        }


        // --- 3. HRACÍ LOGIKA (Skok a Gyro) ---
        const doodle = document.getElementById('doodle-char');
        let posY = 0;
        let posX = 0; 
        let targetPosX = 0; 
        let velocityY = 0;
        const gravity = 0.4;
        const jumpStrength = -10;
        let gameActive = false;

        function startMainGameLogic() {
            gameActive = true;
            update(); // Začneme loopovat fyziku
        }

        // Fyzika skákání
        function update() {
            if (!gameActive) return;

            velocityY += gravity;
            posY += velocityY;

            if (posY > 0) {
                posY = 0;
                velocityY = jumpStrength * 0.6;
            }

            posX += (targetPosX - posX) * 0.1;
            const limit = (window.innerWidth / 2) - 40;
            posX = Math.max(-limit, Math.min(limit, posX));
            
            doodle.style.transform = `translate(calc(-50% + ${posX}px), ${posY}px)`;
            requestAnimationFrame(update);
        }

        // Velký skok na kliknutí
        window.addEventListener('touchstart', () => { if(gameActive) velocityY = jumpStrength; });
        window.addEventListener('mousedown', () => { if(gameActive) velocityY = jumpStrength; });

        // Gyroskop
        function handleOrientation(event) {
            if (!gameActive) return;
            const tilt = event.gamma; 
            targetPosX = tilt * 6; // Citlivost pohybu
        }

        async function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        document.getElementById('gyro-btn').style.display = 'none';
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('gyro-btn').style.display = 'none';
            }
        }

        // SPUŠTĚNÍ DEŠTĚ PO NAČTENÍ STRÁNKY
        window.onload = createEggplantRain;
    </script>

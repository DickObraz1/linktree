    <script>
        const doodle = document.getElementById('doodle-char');
        let posY = 0;
        let posX = 0; 
        let targetPosX = 0; 
        let velocityY = 0;
        const gravity = 0.4;
        const jumpStrength = -10;

        function update() {
            velocityY += gravity;
            posY += velocityY;

            if (posY > 0) {
                posY = 0;
                velocityY = jumpStrength * 0.6;
            }

            posX += (targetPosX - posX) * 0.1;
            const limit = (window.innerWidth / 2) - 40;
            posX = Math.max(-limit, Math.min(limit, posX));
            
            doodle.style.transform = `translate(calc(-50% + ${posX}px), ${posY}px)`;
            requestAnimationFrame(update);
        }

        window.addEventListener('touchstart', () => { velocityY = jumpStrength; });
        window.addEventListener('mousedown', () => { velocityY = jumpStrength; });

        function handleOrientation(event) {
            const tilt = event.gamma; 
            targetPosX = tilt * 6; // Citlivost pohybu
        }

        async function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        document.getElementById('gyro-btn').style.display = 'none';
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('gyro-btn').style.display = 'none';
            }
        }

        update();
    </script>
